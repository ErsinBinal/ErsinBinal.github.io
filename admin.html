<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Icerik Yonetimi - Convivium</title>
  <meta name="description" content="Convivium icerik yonetimi paneli.">
  <meta name="author" content="Ersin Binal">
  <link rel="canonical" href="https://ersinbinal.github.io/admin.html">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline' https://cdn.jsdelivr.net; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: https:; connect-src 'self' https://*.supabase.co wss://*.supabase.co;">
  <meta name="theme-color" content="#00ff00">
  <link rel="manifest" href="/manifest.json">
  <link rel="icon" type="image/svg+xml" href="/assets/icons/icon.svg">
  <link rel="stylesheet" href="/assets/css/common.css">
  <link rel="stylesheet" href="/assets/css/animations.css">
  <link rel="stylesheet" href="/assets/css/components.css?v=29">
  <link rel="stylesheet" href="/assets/css/arcade-kit.css?v=33">
  <link rel="stylesheet" href="/assets/css/neon-sheep.css?v=29">
</head>
<body class="bugy-debug">
  <a class="skip-link" href="#content">Icerigi atla</a>

  <div class="site site-wide">
    <header class="site-header" role="banner">
      <h1>Icerik Yonetimi</h1>
      <p>Makaleleri veritabanina tasiyan admin paneli.</p>
      <nav role="navigation" aria-label="Site navigasyonu" style="margin-top: 12px;">
        <a href="index.html" class="btn">&#8592; Ana Sayfa</a>
        <a href="dashboard.html" class="btn">Dashboard</a>
        <a href="makaleler.html" class="btn">Makaleler</a>
        <a href="auth.html" class="btn">Uyelik</a>
      </nav>
    </header>

    <main id="content" role="main" class="admin-layout">
      <section id="adminGate" class="system-status" aria-live="polite">Yukleniyor...</section>

      <section class="bugy-admin-panel" aria-labelledby="arcadeKitTitle">
        <div class="admin-toolbar">
          <div>
            <h2 id="arcadeKitTitle">Arcade Kit Lab</h2>
            <p id="arcadeKitStatus" aria-live="polite">Arcade cekirdegi hazirlaniyor...</p>
          </div>
          <div class="bugy-toggle-row">
            <label class="bugy-skin-select">
              Palet
              <select id="arcadePaletteSelect">
                <option value="neon">Neon</option>
                <option value="gameboy">Game Boy</option>
                <option value="famicom">Famicom</option>
                <option value="neogeo">Neo Geo</option>
                <option value="mono">Mono</option>
              </select>
            </label>
            <label class="bugy-skin-select">
              Karakter
              <select id="arcadeCharacterSelect">
                <option value="mascot">Mascot</option>
                <option value="runner">Runner</option>
                <option value="mech">Mech</option>
                <option value="wisp">Wisp</option>
                <option value="boss">Boss</option>
              </select>
            </label>
            <label class="bugy-random-toggle">
              <input id="arcadeDebugToggle" type="checkbox">
              Hitbox debug
            </label>
          </div>
        </div>
        <div id="arcadeDemoMount" class="arcade-demo-stage"></div>
        <div class="arcade-control-grid" aria-label="Arcade Kit denemeleri">
          <button class="btn btn-primary" type="button" data-arcade-demo="burst">Pixel Patlama</button>
          <button class="btn btn-primary" type="button" data-arcade-demo="flash">Ekran Flash</button>
          <button class="btn btn-primary" type="button" data-arcade-demo="shake">Sahne Sars</button>
          <button class="btn btn-primary" type="button" data-arcade-demo="popup">Popup Yazı</button>
          <button class="btn btn-primary" type="button" data-arcade-demo="timeline">Timeline Storm</button>
          <button class="btn btn-primary" type="button" data-arcade-demo="tornado">Timeline Hortum</button>
          <button class="btn btn-primary" type="button" data-arcade-demo="portal">Timeline Portal</button>
          <button class="btn btn-primary" type="button" data-arcade-demo="canvas">Canvas Ping</button>
          <button class="btn btn-primary" type="button" data-arcade-demo="shooter">Mini Shooter</button>
          <button class="btn btn-primary" type="button" data-arcade-demo="storage">Skor Kaydet</button>
          <button class="btn" type="button" data-arcade-demo="sprite">Sprite Değiştir</button>
          <button class="btn" type="button" data-character-pose="idle">Pose Idle</button>
          <button class="btn" type="button" data-character-pose="walk">Pose Walk</button>
          <button class="btn" type="button" data-character-pose="jump">Pose Jump</button>
          <button class="btn" type="button" data-character-pose="hit">Pose Hit</button>
          <button class="btn" type="button" data-character-pose="cast">Pose Cast</button>
        </div>
      </section>

      <section class="bugy-admin-panel" aria-labelledby="bugyAdminTitle">
        <div class="admin-toolbar">
          <div>
            <h2 id="bugyAdminTitle">Bugy Kontrol</h2>
            <p id="bugyStatus" aria-live="polite">Bugy hazirlaniyor...</p>
          </div>
          <div class="bugy-toggle-row">
            <label class="bugy-skin-select">
              Motor
              <select id="bugyEngineSelect">
                <option value="v1">Bugy V1</option>
                <option value="v2">Bugy V2</option>
              </select>
            </label>
            <label class="bugy-skin-select">
              Skin
              <select id="bugySkinSelect">
                <option value="classic">Klasik Neon</option>
                <option value="matrix">Matrix Drone</option>
                <option value="ember">Ember Horn</option>
                <option value="ghost">Ghost Wisp</option>
                <option value="royal">Royal Crown</option>
              </select>
            </label>
            <label class="bugy-random-toggle">
              <input id="bugyRandomToggle" type="checkbox" checked>
              Rastgele aksiyonlar
            </label>
            <button id="bugySummon" class="btn" type="button">Bugy'i Cagir</button>
          </div>
        </div>

        <div class="bugy-control-grid" aria-label="Bugy aksiyonlari">
          <button class="btn btn-primary" type="button" data-bugy-action="storm">Firtina + Yildirim</button>
          <button class="btn btn-primary" type="button" data-bugy-action="tornado">Hortum + Firlat</button>
          <button class="btn btn-primary" type="button" data-bugy-action="portal">Portal</button>
          <button class="btn btn-primary" type="button" data-bugy-action="clone">Clone Glitch</button>
          <button class="btn btn-primary" type="button" data-bugy-action="gravity">Dusuk Yercekimi</button>
          <button class="btn btn-primary" type="button" data-bugy-action="abduct">UFO</button>
          <button id="bugyNextAction" class="btn" type="button">Siradaki Aksiyon</button>
        </div>
      </section>

      <section id="adminWorkspace" hidden>
        <div class="admin-toolbar">
          <div>
            <h2>Makale Havuzu</h2>
            <p id="adminStatus" aria-live="polite">Hazir.</p>
          </div>
          <button id="clearForm" class="btn" type="button">Yeni Makale</button>
        </div>

        <div class="content-admin-grid">
          <aside class="content-list-panel" aria-label="Makale listesi">
            <ul id="articleList" class="content-list"></ul>
          </aside>

          <form id="articleForm" class="form-panel editor-panel">
            <input type="hidden" name="id">

            <label>
              Baslik
              <input id="title" name="title" type="text" required maxlength="160">
            </label>

            <label>
              Slug
              <input id="slug" name="slug" type="text" required maxlength="96" pattern="[a-z0-9-]+">
            </label>

            <label>
              Ozet
              <textarea name="summary" rows="3" required maxlength="320"></textarea>
            </label>

            <div class="form-row">
              <label>
                Durum
                <select name="status">
                  <option value="draft">Taslak</option>
                  <option value="published">Yayinda</option>
                  <option value="archived">Arsiv</option>
                </select>
              </label>

              <label>
                Yayin zamani
                <input name="published_at" type="datetime-local">
              </label>
            </div>

            <label>
              Icerik HTML
              <textarea id="content_html" name="content_html" rows="16" required></textarea>
            </label>

            <div class="form-actions">
              <button class="btn btn-primary" type="submit">Kaydet</button>
              <button id="deleteArticle" class="btn" type="button" disabled>Sil</button>
            </div>
          </form>

          <section class="preview-panel" aria-label="Makale onizleme">
            <h2>Onizleme</h2>
            <div id="articlePreview" class="full active">
              <p>Onizleme burada gorunur.</p>
            </div>
          </section>
        </div>
      </section>
    </main>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2" defer></script>
  <script src="/assets/js/supabase-config.js" defer></script>
  <script src="/assets/js/supabase-client.js?v=21" defer></script>
  <script src="/assets/js/arcade-kit.js?v=32" defer></script>
  <script src="/assets/js/neon-sheep.js?v=29" defer></script>
  <script src="/assets/js/bugy-v2.js?v=1" defer></script>
  <script src="/assets/js/admin.js?v=33" defer></script>
</body>
</html>
