  <circle cx="130" cy="107" r="8" fill="#ff4f6f"/>
  <circle cx="158" cy="107" r="8" fill="#ffd166"/>
  <circle cx="186" cy="107" r="8" fill="#00ff88"/>
  <text x="222" y="116" fill="#8dffbd" font-family="Courier New, monospace" font-size="22">CONVIVIUM / TERMINAL GUIDE</text>
  <rect x="132" y="172" width="456" height="52" rx="8" fill="#06110e" stroke="#0ce6ff"/>
  <text x="158" y="206" fill="#00e5ff" font-family="Courier New, monospace" font-size="28">&gt; guide</text>
  <rect x="132" y="248" width="456" height="52" rx="8" fill="#06110e" stroke="#00ff88"/>
  <text x="158" y="282" fill="#00ff88" font-family="Courier New, monospace" font-size="28">&gt; how to play</text>
  <rect x="132" y="324" width="456" height="52" rx="8" fill="#06110e" stroke="#ff4fd8"/>
