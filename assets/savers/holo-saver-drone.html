      if(el.requestFullscreen){ el.requestFullscreen().then(()=>document.body.classList.add('fs')).catch(()=>{}); }
    });
    document.addEventListener('fullscreenchange',()=>{
      document.body.classList.toggle('fs',Boolean(document.fullscreenElement));
    });
  </script>
</body></html>
