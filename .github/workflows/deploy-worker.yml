name: Deploy Oracle Worker

# Tum yerel/Workers-runtime kontrolleri ve Wrangler dry-run basarili olmadan
# production deploy adimina gecmez. Gereken repository secret'lari:
#   CLOUDFLARE_API_TOKEN  (zorunlu, "Edit Cloudflare Workers" yetkili token)
#   CLOUDFLARE_ACCOUNT_ID (token tek hesaba bagliysa opsiyonel)

on:
  workflow_dispatch: {}
  push:
    branches:
      - main
    paths:
      - 'workers/oracle/**'
      - 'assets/js/supabase-client.js'
      - 'package.json'
      - 'package-lock.json'
      - 'vitest.config.mjs'
      - '.github/workflows/deploy-worker.yml'

permissions:
  contents: read

concurrency:
  group: oracle-production
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 22

      - name: Bagimliliklari kilitli kur
        run: npm ci

      - name: Statik, unit, Workers-runtime ve site kontrolleri
        run: npm run check

      - name: Wrangler production dry-run
        run: npx wrangler deploy --dry-run --config workers/oracle/wrangler.toml --outdir "${RUNNER_TEMP}/oracle-dry-run"

      - name: Production deploy
        run: npx wrangler deploy --config workers/oracle/wrangler.toml --tag "$GITHUB_SHA" --message "GitHub Actions $GITHUB_SHA"
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Health ve version metadata smoke
        env:
          WORKER_HEALTH_URL: https://convivium-oracle.convivium.workers.dev/health
        # Yeni surum edge'lere kademeli yayilir; /health kisa bir sure ESKI
        # tag ile 200 donebilir. curl retry'lari yalniz tasima hatalarini
        # kapsar; bu yuzden tag eslesmesi de sinirli sureyle YOKLANIR
        # (24 deneme x 5 sn ~= 2 dk). Basarisizlikta son govde loglanir.
        run: |
          for attempt in $(seq 1 24); do
            health_json="$(curl --silent --max-time 15 "$WORKER_HEALTH_URL" || true)"
            if HEALTH_JSON="$health_json" node -e 'const body = JSON.parse(process.env.HEALTH_JSON || "{}"); process.exit(body.status === "ok" && body.version?.id && body.version.tag === process.env.GITHUB_SHA ? 0 : 1)' 2>/dev/null; then
              HEALTH_JSON="$health_json" ATTEMPT="$attempt" node -e 'const body = JSON.parse(process.env.HEALTH_JSON); console.log(JSON.stringify({ service: body.service, status: body.status, commit: process.env.GITHUB_SHA, attempt: process.env.ATTEMPT, version: body.version }))' || true
              exit 0
            fi
            echo "deneme $attempt/24: surum henuz eslesmiyor, 5 sn sonra tekrar"
            sleep 5
          done
          echo "SON GOVDE: $health_json"
          echo "beklenen tag: $GITHUB_SHA"
          exit 1
