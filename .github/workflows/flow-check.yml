name: Flow Check (smoke + e2e)

# Elle tetiklenir: Actions sekmesi -> "Flow Check" -> Run workflow.
on:
  workflow_dispatch:
    inputs:
      run_e2e:
        description: "Playwright E2E de calissin mi?"
        type: boolean
        default: true
      skip_worker:
        description: "Worker (AI arama) kontrollerini atla"
        type: boolean
        default: false

jobs:
  flow-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 22

      - name: Bagimliliklari kur
        run: npm install

      - name: Smoke testleri
        env:
          SKIP_WORKER: ${{ inputs.skip_worker && '1' || '' }}
        run: npm run test:smoke

      - name: Playwright tarayicilari
        if: ${{ inputs.run_e2e }}
        run: npx playwright install --with-deps chromium

      - name: E2E testleri
        if: ${{ inputs.run_e2e }}
        run: npm run test:e2e

      - name: E2E raporunu yukle
        if: ${{ always() && inputs.run_e2e }}
        uses: actions/upload-artifact@v5
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 14
