<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Universe-2: Akıntı Filosu | Convivium</title>
  <meta name="description" content="Neon River sonrası başlayan dikey arcade shooter.">
  <meta name="author" content="Ersin Binal">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    html,
    body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #050510;
      color: #eaffff;
      font-family: "Courier New", monospace;
      touch-action: none;
      user-select: none;
    }

    #stage {
      position: fixed;
      inset: 0;
      display: grid;
      place-items: center;
      background:
        radial-gradient(circle at center, rgba(0, 255, 255, 0.08), transparent 46%),
        linear-gradient(#030315, #080414 58%, #02020a);
    }

    #game {
      display: block;
      width: min(100vw, calc(100vh * 0.7619));
      height: min(100vh, calc(100vw * 1.3125));
      image-rendering: pixelated;
      background: #030315;
      box-shadow: 0 0 34px rgba(0, 255, 255, 0.18);
    }

    #scanlines {
      position: fixed;
      inset: 0;
      pointer-events: none;
      background:
        linear-gradient(rgba(255,255,255,0.035) 50%, rgba(0,0,0,0.1) 50%),
        radial-gradient(circle at center, transparent 46%, rgba(0,0,0,0.36));
      background-size: 100% 4px, 100% 100%;
      opacity: 0.36;
      z-index: 20;
    }

    #hud {
      position: fixed;
      left: 16px;
      top: 14px;
      z-index: 30;
      width: min(270px, calc(100vw - 32px));
      color: rgba(205, 255, 255, 0.92);
      text-shadow: 0 0 10px rgba(0, 255, 255, 0.65);
      font-size: 14px;
      line-height: 1.35;
      pointer-events: none;
    }

    .hud-row {
      display: flex;
      justify-content: space-between;
      gap: 14px;
      border-bottom: 1px solid rgba(85, 255, 255, 0.13);
      padding: 3px 0;
    }

    .hud-row strong { color: #fff; }

    #message {
      position: fixed;
      left: 50%;
      bottom: 28px;
      z-index: 30;
      width: min(720px, calc(100vw - 28px));
      transform: translateX(-50%);
      text-align: center;
      color: #fff;
      font-size: clamp(14px, 2.4vw, 22px);
      text-shadow: 0 0 12px rgba(0,255,255,0.9), 0 0 22px rgba(255,85,255,0.7);
      opacity: 0;
      transition: opacity 0.22s ease;
      pointer-events: none;
    }

    #message.show { opacity: 1; }

    #intro,
    #gameOver {
      position: fixed;
      inset: 0;
      display: grid;
      place-items: center;
      z-index: 100;
      background: #02020a;
      transition: opacity 0.8s ease;
    }

    #intro.hide,
    #gameOver.hide {
      opacity: 0;
      pointer-events: none;
    }

    #intro.rift {
      background:
        radial-gradient(circle at center, rgba(255,85,255,0.24), transparent 28%),
        linear-gradient(#050019, #02020a);
      overflow: hidden;
    }

    .river-grid {
      position: absolute;
      width: min(74vmin, 620px);
      height: min(74vmin, 620px);
      transform: perspective(720px) rotateX(58deg) translateY(16vmin);
      background:
        linear-gradient(90deg, transparent 0 41%, rgba(0,255,255,0.9) 41% 45%, transparent 45% 55%, rgba(255,85,255,0.75) 55% 59%, transparent 59%),
        linear-gradient(rgba(85,255,255,0.22) 2px, transparent 2px),
        linear-gradient(90deg, rgba(255,85,255,0.18) 2px, transparent 2px),
        #03152a;
      background-size: 100% 100%, 24px 24px, 24px 24px, 100% 100%;
      clip-path: polygon(36% 0, 64% 0, 100% 100%, 0 100%);
      image-rendering: pixelated;
      animation: riverToRunway 8.5s ease-in-out forwards;
    }

    .story {
      position: relative;
      z-index: 2;
      width: min(90vw, 820px);
      min-height: 310px;
      display: grid;
      place-items: center;
      text-align: center;
    }

    .story-line {
      position: absolute;
      max-width: min(88vw, 760px);
      color: #eaffff;
      font-size: clamp(22px, 4.8vw, 46px);
      text-shadow: 0 0 16px rgba(0,255,255,0.92), 0 0 28px rgba(255,85,255,0.72);
      opacity: 0;
      animation: storyLine 3s ease-in-out forwards;
    }

    .story-line.small {
      font-size: clamp(15px, 2.5vw, 24px);
      color: #c9ffff;
    }

    .line-1 { animation-delay: 0.1s; }
    .line-2 { animation-delay: 1.8s; }
    .line-3 { animation-delay: 3.5s; }
    .line-4 { animation-delay: 5.3s; }

    .panel {
      width: min(520px, calc(100vw - 28px));
      padding: 26px;
      border: 2px solid rgba(85, 255, 255, 0.62);
      background: rgba(2, 3, 16, 0.86);
      text-align: center;
      box-shadow: 0 0 34px rgba(0,255,255,0.2);
    }

    .panel h1 {
      font-size: clamp(28px, 7vw, 58px);
      color: #fff;
      margin-bottom: 10px;
      text-shadow: 0 0 20px rgba(255,85,255,0.8);
    }

    .panel p {
      margin: 8px 0;
      color: #c9ffff;
      line-height: 1.45;
    }

    .panel button {
      margin-top: 16px;
      padding: 12px 18px;
      border: 2px solid #74ffff;
      background: #08162a;
      color: #fff;
      font: 700 18px "Courier New", monospace;
      cursor: pointer;
    }

    @keyframes storyLine {
      0% { opacity: 0; transform: translateY(20px); }
      18%, 72% { opacity: 1; transform: translateY(0); }
      100% { opacity: 0; transform: translateY(-18px); }
    }

    @keyframes riverToRunway {
      0% { opacity: 1; filter: saturate(1); transform: perspective(720px) rotateX(58deg) translateY(16vmin) scale(1); }
      52% { opacity: 1; filter: saturate(1.5) contrast(1.2); }
      78% { opacity: 0.46; transform: perspective(720px) rotateX(42deg) translateY(2vmin) scale(0.82); }
      100% { opacity: 0; transform: perspective(720px) rotateX(10deg) translateY(-10vmin) scale(0.28); }
    }

    @media (max-width: 720px) {
      #hud { font-size: 11px; width: 210px; }
      #message { bottom: 18px; }
    }
  </style>
</head>
<body>
  <div id="stage">
    <canvas id="game" width="640" height="840" aria-label="Universe-2 arcade shooter"></canvas>
  </div>
  <div id="scanlines"></div>

  <div id="hud">
    <div class="hud-row"><span>1UP</span><strong id="score">0</strong></div>
    <div class="hud-row"><span>DALGA</span><strong id="wave">1</strong></div>
    <div class="hud-row"><span>SİLAH</span><strong id="weapon">NEON</strong></div>
    <div class="hud-row"><span>SEVİYE</span><strong id="power">1</strong></div>
    <div class="hud-row"><span>BOMBA</span><strong id="bombs">2</strong></div>
    <div class="hud-row"><span>CAN</span><strong id="lives">3</strong></div>
  </div>

  <div id="message"></div>

  <div id="intro">
    <div class="river-grid"></div>
    <div class="story">
      <div class="story-line line-1">EVREN-2: AKINTI FİLOSU</div>
      <div class="story-line small line-2">NEON AKINTI ARTIK BİR SAVAŞ ROTASI.</div>
      <div class="story-line line-3">DÜŞMAN HATLARINI YAR.</div>
      <div class="story-line small line-4">WASD/OKLAR HAREKET, BOŞLUK ATEŞ, X BOMBA.</div>
    </div>
  </div>

  <div id="gameOver" class="hide">
    <div class="panel">
      <h1>UÇAK DÜŞTÜ</h1>
      <p id="finalScore">Skor: 0</p>
      <p id="finalWave">Dalga: 1</p>
      <p id="finalHigh">En iyi skor: 0</p>
      <button id="nextUniverse" type="button" style="display:none;">EVREN-3'E GEÇ</button>
      <button id="restart" type="button">YENİDEN BAŞLAT</button>
    </div>
  </div>

  <script>
    (() => {
      "use strict";

      const W = 640;
      const H = 840;
      const canvas = document.getElementById("game");
      const ctx = canvas.getContext("2d");
      ctx.imageSmoothingEnabled = false;

      const entryParams = new URLSearchParams(location.search);
      let shiftedEntry = null;
      try {
        shiftedEntry = JSON.parse(sessionStorage.getItem("neonRiverDimensionShift") || "null");
      } catch (e) {}

      const fromNeon = entryParams.get("rift") === "neon" || !!shiftedEntry;
      const rawScore = Number(entryParams.get("score") || (shiftedEntry && shiftedEntry.score) || 0);
      const carriedScore = Number.isFinite(rawScore) ? Math.max(0, rawScore) : 0;

      const ui = {
        intro: document.getElementById("intro"),
        gameOver: document.getElementById("gameOver"),
        message: document.getElementById("message"),
        score: document.getElementById("score"),
        wave: document.getElementById("wave"),
        weapon: document.getElementById("weapon"),
        power: document.getElementById("power"),
        bombs: document.getElementById("bombs"),
        lives: document.getElementById("lives"),
        finalScore: document.getElementById("finalScore"),
        finalWave: document.getElementById("finalWave"),
        finalHigh: document.getElementById("finalHigh"),
        nextUniverse: document.getElementById("nextUniverse"),
        restart: document.getElementById("restart")
      };

      if (fromNeon) {
        ui.intro.classList.add("rift");
        ui.intro.querySelector(".line-1").textContent = "NERESİ... BURASI?";
        ui.intro.querySelector(".line-2").textContent = "NEON RIVER PİSTLERİ GÖKYÜZÜNE KIRILDI.";
        ui.intro.querySelector(".line-3").textContent = "SKORUN AKINTIYLA TAŞINDI.";
        ui.intro.querySelector(".line-4").textContent = "ŞİMDİ FİLOYU DURDUR.";
      }

      const keys = {};
      const pointer = { active: false, x: W / 2, y: H - 86 };
      const playerShots = [];
      const enemyShots = [];
      const enemies = [];
      const particles = [];
      const powerups = [];
      const hazards = [];
      const clouds = [];
      const stars = [];

      let audioCtx = null;
      let last = performance.now();
      let spawnClock = 0;
      let hazardClock = 2.5;
      let messageClock = 0;
      let bossSpawned = false;

      const state = {
        mode: "intro",
        score: carriedScore,
        high: Math.max(Number(localStorage.getItem("universe2ArcadeHigh") || 0), carriedScore),
        wave: 1,
        lives: 3,
        bombs: 2,
        weapon: "neon",
        weaponLevels: { neon: 1, laser: 1, rocket: 1, sonic: 1 },
        fireCooldown: 0,
        invuln: 0,
        scroll: 0,
        kills: 0,
        targetKills: 14,
        shake: 0,
        bombFlash: 0,
        lightningFlash: 0,
        nextDimension: false
      };

      const weaponNames = {
        neon: "NEON",
        laser: "LAZER",
        rocket: "ROKET",
        sonic: "SONİK"
      };

      const enemyTypes = {
        red: { hp: 2, speed: 88, score: 140, r: 13, fire: 1.8 },
        blue: { hp: 3, speed: 66, score: 220, r: 15, fire: 1.35 },
        heavy: { hp: 9, speed: 42, score: 620, r: 22, fire: 1.15 },
        turret: { hp: 5, speed: 30, score: 360, r: 18, fire: 0.9 },
        boss: { hp: 140, speed: 18, score: 4500, r: 54, fire: 0.28 }
      };

      function init() {
        for (let i = 0; i < 110; i++) {
          stars.push({ x: Math.random() * W, y: Math.random() * H, s: 0.6 + Math.random() * 1.7, v: 24 + Math.random() * 64 });
        }
        for (let i = 0; i < 12; i++) {
          clouds.push({
            x: Math.random() * W,
            y: Math.random() * H,
            w: 58 + Math.random() * 96,
            v: 14 + Math.random() * 28,
            a: 0.07 + Math.random() * 0.08,
            storm: Math.random() < 0.22,
            pulse: Math.random() * Math.PI * 2
          });
        }

        window.addEventListener("keydown", onKeyDown);
        window.addEventListener("keyup", (e) => { keys[e.code] = false; });
        window.addEventListener("pointerdown", onPointer);
        window.addEventListener("pointermove", onPointer);
        window.addEventListener("pointerup", () => { pointer.active = false; });
        ui.restart.addEventListener("click", restart);
        ui.nextUniverse.addEventListener("click", () => {
          sessionStorage.setItem("universe2ArcadeScore", String(state.score));
          location.href = "universe-3.html?score=" + encodeURIComponent(String(state.score)) + "&rift=universe2";
        });

        setTimeout(() => {
          ui.intro.classList.add("hide");
          setTimeout(() => {
            state.mode = "play";
            showMessage(fromNeon ? "NEON RIVER BAĞLAMI KORUNDU" : "DALGA 1 BAŞLIYOR", 1800);
            try { sessionStorage.removeItem("neonRiverDimensionShift"); } catch (e) {}
          }, 700);
        }, fromNeon ? 8300 : 7200);

        updateHud();
        requestAnimationFrame(loop);
      }

      function onKeyDown(e) {
        keys[e.code] = true;
        ensureAudio();
        if (["ArrowUp", "ArrowDown", "ArrowLeft", "ArrowRight", "Space"].includes(e.code)) e.preventDefault();
        if (e.code === "Enter" && state.mode === "intro") {
          ui.intro.classList.add("hide");
          setTimeout(() => { state.mode = "play"; }, 250);
        }
        if ((e.code === "KeyX" || e.code === "ShiftLeft" || e.code === "ShiftRight") && state.mode === "play") useBomb();
        if (e.code === "KeyR" && state.mode === "over") restart();
      }

      function onPointer(e) {
        pointer.active = true;
        const rect = canvas.getBoundingClientRect();
        pointer.x = ((e.clientX - rect.left) / rect.width) * W;
        pointer.y = ((e.clientY - rect.top) / rect.height) * H;
        ensureAudio();
      }

      function ensureAudio() {
        if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        if (audioCtx.state === "suspended") audioCtx.resume();
      }

      function beep(freq, duration, type = "square", volume = 0.035) {
        if (!audioCtx) return;
        try {
          const osc = audioCtx.createOscillator();
          const gain = audioCtx.createGain();
          osc.type = type;
          osc.frequency.value = freq;
          gain.gain.value = volume;
          gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + duration);
          osc.connect(gain);
          gain.connect(audioCtx.destination);
          osc.start();
          osc.stop(audioCtx.currentTime + duration);
        } catch (e) {}
      }

      function sound(name) {
        if (name === "laser") {
          beep(1180, 0.035, "sawtooth", 0.018);
          setTimeout(() => beep(1540, 0.025, "sine", 0.012), 18);
        } else if (name === "rocket") {
          beep(170, 0.07, "sawtooth", 0.03);
          setTimeout(() => beep(95, 0.08, "square", 0.018), 35);
        } else if (name === "sonic") {
          beep(260, 0.11, "triangle", 0.035);
          setTimeout(() => beep(430, 0.09, "sine", 0.025), 40);
        } else if (name === "bomb") {
          beep(80, 0.28, "sawtooth", 0.065);
          setTimeout(() => beep(220, 0.18, "triangle", 0.045), 90);
          setTimeout(() => beep(520, 0.12, "sine", 0.025), 180);
        } else if (name === "power") {
          beep(620, 0.06, "triangle", 0.028);
          setTimeout(() => beep(880, 0.08, "triangle", 0.028), 65);
        } else if (name === "hazard") {
          beep(55, 0.18, "sawtooth", 0.045);
        } else if (name === "hit") {
          beep(70, 0.22, "sawtooth", 0.055);
        }
      }

      function loop(now) {
        const dt = Math.min((now - last) / 1000, 0.033);
        last = now;

        if (state.mode === "play") update(dt);
        else updateBackdrop(dt);

        draw();
        requestAnimationFrame(loop);
      }

      const player = {
        x: W / 2,
        y: H - 82,
        vx: 0,
        vy: 0,
        r: 10
      };

      function update(dt) {
        updateBackdrop(dt);
        updatePlayer(dt);
        updateSpawns(dt);
        updateHazards(dt);
        updateShots(dt);
        updateEnemies(dt);
        updatePowerups(dt);
        updateParticles(dt);
        collide();

        state.fireCooldown = Math.max(0, state.fireCooldown - dt);
        state.invuln = Math.max(0, state.invuln - dt);
        state.shake = Math.max(0, state.shake - dt * 34);
        state.bombFlash = Math.max(0, state.bombFlash - dt * 2.8);
        state.lightningFlash = Math.max(0, state.lightningFlash - dt * 4.2);
        if (messageClock > 0) {
          messageClock -= dt;
          if (messageClock <= 0) ui.message.classList.remove("show");
        }

        if (state.kills >= state.targetKills && enemies.length === 0 && !bossSpawned) nextWave();
        updateHud();
      }

      function updateBackdrop(dt) {
        state.scroll += dt * (72 + state.wave * 3);
        for (const s of stars) {
          s.y += s.v * dt;
          if (s.y > H) { s.y = -4; s.x = Math.random() * W; }
        }
        for (const c of clouds) {
          c.y += c.v * dt;
          c.pulse += dt;
          if (c.y > H + 40) { c.y = -70; c.x = Math.random() * W; }
        }
      }

      function updateHazards(dt) {
        hazardClock -= dt;
        if (hazardClock <= 0) {
          spawnHazard();
          hazardClock = Math.max(1.4, 3.4 - state.wave * 0.08) + Math.random() * 1.8;
        }

        for (let i = hazards.length - 1; i >= 0; i--) {
          const h = hazards[i];
          h.age += dt;
          h.y += h.vy * dt;
          h.x += h.vx * dt;

          if (h.type === "volcano") {
            h.fire -= dt;
            if (h.fire <= 0) {
              h.fire = 0.55 + Math.random() * 0.45;
              hazards.push({
                type: "lava",
                x: h.x + (Math.random() - 0.5) * 46,
                y: h.y - 30,
                vx: (Math.random() - 0.5) * 80,
                vy: -210 - Math.random() * 90,
                r: 13,
                damage: 4,
                age: 0,
                life: 2.8
              });
              sound("hazard");
            }
          } else if (h.type === "lava") {
            h.vy += 190 * dt;
            damageInCircle(h.x, h.y, h.r, 5 * dt, true);
          } else if (h.type === "storm") {
            h.fire -= dt;
            if (h.fire <= 0) {
              h.fire = 1.1 + Math.random() * 0.8;
              h.strikeX = h.x + (Math.random() - 0.5) * h.w;
              h.strikeTime = 0.18;
              state.lightningFlash = 0.35;
              damageInCircle(h.strikeX, h.y + 124, 36, 6);
              sound("hazard");
            }
            h.strikeTime = Math.max(0, h.strikeTime - dt);
          } else if (h.type === "tornado") {
            h.x += Math.sin(h.age * 3.1) * 58 * dt;
            damageInCircle(h.x, h.y, h.r, 3 * dt, true);
          } else if (h.type === "meteor") {
            if (h.y > -10 && h.y < H + 20) damageInCircle(h.x, h.y, h.r, 5 * dt, true);
          }

          h.life -= dt;
          if (h.life <= 0 || h.y > H + 110 || h.x < -120 || h.x > W + 120) hazards.splice(i, 1);
        }
      }

      function spawnHazard() {
        const roll = Math.random();
        if (roll < 0.28) {
          hazards.push({ type: "volcano", x: 70 + Math.random() * (W - 140), y: -36, vx: 0, vy: 54, r: 36, fire: 0.4, age: 0, life: 8 });
          showMessage("VOLKAN BACASI AKTİF", 1100);
        } else if (roll < 0.52) {
          hazards.push({ type: "storm", x: 90 + Math.random() * (W - 180), y: -80, vx: 0, vy: 42, w: 150, r: 48, fire: 0.8, strikeTime: 0, age: 0, life: 8 });
          showMessage("YILDIRIM YÜKLÜ BULUT", 1100);
        } else if (roll < 0.74) {
          hazards.push({ type: "tornado", x: 90 + Math.random() * (W - 180), y: -70, vx: 0, vy: 76, r: 34, age: 0, life: 7.5 });
        } else {
          for (let i = 0; i < 3; i++) {
            hazards.push({ type: "meteor", x: Math.random() * W, y: -60 - i * 54, vx: -70 + Math.random() * 140, vy: 250 + Math.random() * 90, r: 14 + Math.random() * 8, age: 0, life: 4.5 });
          }
          showMessage("METEOR YAĞMURU", 1000);
        }
      }

      function damageInCircle(x, y, radius, damage, continuous) {
        for (let i = enemies.length - 1; i >= 0; i--) {
          const e = enemies[i];
          if (dist(x, y, e.x, e.y) <= radius + e.r) {
            e.hp -= damage;
            hitSpark(e.x, e.y, "#ffcf52", continuous ? 1 : 8);
            if (e.hp <= 0) killEnemy(i);
          }
        }
        if (state.invuln <= 0 && dist(x, y, player.x, player.y) <= radius + player.r) {
          hurtPlayer();
        }
      }

      function updatePlayer(dt) {
        let ax = 0;
        let ay = 0;
        if (keys.ArrowLeft || keys.KeyA) ax -= 1;
        if (keys.ArrowRight || keys.KeyD) ax += 1;
        if (keys.ArrowUp || keys.KeyW) ay -= 1;
        if (keys.ArrowDown || keys.KeyS) ay += 1;

        if (pointer.active) {
          player.x += (pointer.x - player.x) * Math.min(1, dt * 12);
          player.y += (pointer.y - player.y) * Math.min(1, dt * 12);
        } else {
          player.vx += ax * 680 * dt;
          player.vy += ay * 620 * dt;
          player.vx *= Math.pow(0.035, dt);
          player.vy *= Math.pow(0.035, dt);
          player.x += player.vx * dt;
          player.y += player.vy * dt;
        }

        player.x = clamp(player.x, 24, W - 24);
        player.y = clamp(player.y, 72, H - 36);

        if (keys.Space || pointer.active) fire();
      }

      function fire() {
        if (state.fireCooldown > 0) return;
        const level = currentLevel();

        if (state.weapon === "laser") {
          state.fireCooldown = Math.max(0.038, 0.078 - level * 0.006);
          addPlayerShot(player.x, player.y - 24, 0, -720, 1.25 + level * 0.45, "laser", 4, 1 + Math.floor(level / 2));
          if (level >= 3) {
            addPlayerShot(player.x - 14, player.y - 18, -12, -690, 1.05 + level * 0.3, "laser", 3, 1);
            addPlayerShot(player.x + 14, player.y - 18, 12, -690, 1.05 + level * 0.3, "laser", 3, 1);
          }
          sound("laser");
        } else if (state.weapon === "rocket") {
          state.fireCooldown = Math.max(0.18, 0.34 - level * 0.03);
          addPlayerShot(player.x - 10, player.y - 14, -24, -330, 5.5 + level * 1.4, "rocket", 7, 1);
          if (level >= 2) addPlayerShot(player.x + 10, player.y - 14, 24, -330, 5.5 + level * 1.4, "rocket", 7, 1);
          if (level >= 4) addPlayerShot(player.x, player.y - 28, 0, -350, 7 + level * 1.5, "rocket", 8, 1);
          sound("rocket");
        } else if (state.weapon === "sonic") {
          state.fireCooldown = Math.max(0.21, 0.42 - level * 0.034);
          addPlayerShot(player.x, player.y - 24, 0, -300, 3.8 + level * 1.1, "sonic", 18 + level * 3, 8 + level * 2);
          sound("sonic");
        } else {
          state.fireCooldown = Math.max(0.065, 0.12 - level * 0.012);
          const spread = level >= 3 ? 14 : 9;
          addPlayerShot(player.x, player.y - 18, 0, -520, 2 + level * 0.2, "neon", 4, 1);
          if (level >= 2) {
            addPlayerShot(player.x - spread, player.y - 12, -42, -470, 1.5 + level * 0.12, "neon", 4, 1);
            addPlayerShot(player.x + spread, player.y - 12, 42, -470, 1.5 + level * 0.12, "neon", 4, 1);
          }
          if (level >= 4) {
            addPlayerShot(player.x - 24, player.y - 4, -92, -430, 1.3 + level * 0.08, "neon", 4, 1);
            addPlayerShot(player.x + 24, player.y - 4, 92, -430, 1.3 + level * 0.08, "neon", 4, 1);
          }
          beep(920, 0.035, "square", 0.018);
        }
      }

      function addPlayerShot(x, y, vx, vy, damage, kind, r, pierce) {
        playerShots.push({ x, y, vx, vy, r, damage, kind, pierce, age: 0 });
      }

      function currentLevel() {
        return state.weaponLevels[state.weapon] || 1;
      }

      function updateSpawns(dt) {
        spawnClock -= dt;
        if (bossSpawned) return;

        if (state.wave % 3 === 0 && state.kills >= state.targetKills - 2) {
          spawnEnemy("boss", W / 2, -72, 0);
          bossSpawned = true;
          showMessage("BOSS: YARIK AMİRALİ", 2200);
          return;
        }

        if (spawnClock > 0) return;
        spawnClock = Math.max(0.36, 1.05 - state.wave * 0.045);
        const pattern = Math.random();
        if (pattern < 0.42) spawnV();
        else if (pattern < 0.72) spawnSideSweep();
        else spawnLine();
      }

      function spawnV() {
        const cx = 120 + Math.random() * (W - 240);
        for (let i = -2; i <= 2; i++) {
          spawnEnemy(i === 0 ? "blue" : "red", cx + i * 42, -28 - Math.abs(i) * 18, i);
        }
      }

      function spawnSideSweep() {
        const side = Math.random() < 0.5 ? -1 : 1;
        for (let i = 0; i < 4; i++) {
          const x = side < 0 ? -24 - i * 18 : W + 24 + i * 18;
          spawnEnemy("red", x, -34 - i * 34, side);
        }
      }

      function spawnLine() {
        for (let i = 0; i < 6; i++) {
          const type = i === 2 && state.wave > 1 ? "turret" : (i === 4 && state.wave > 2 ? "heavy" : "red");
          spawnEnemy(type, 78 + i * 96, -28 - i * 20, i - 2);
        }
      }

      function spawnEnemy(type, x, y, lane) {
        const data = enemyTypes[type];
        enemies.push({
          type,
          x,
          y,
          baseX: x,
          lane,
          hp: data.hp + (type === "boss" ? state.wave * 8 : Math.floor(state.wave * 0.35)),
          maxHp: data.hp,
          speed: data.speed + state.wave * 2,
          r: data.r,
          fire: 0.6 + Math.random() * data.fire,
          age: 0,
          score: data.score
        });
      }

      function updateEnemies(dt) {
        for (let i = enemies.length - 1; i >= 0; i--) {
          const e = enemies[i];
          e.age += dt;
          if (e.type === "red") {
            e.x = e.baseX + Math.sin(e.age * 2.5 + e.lane) * 28;
            e.y += e.speed * dt;
          } else if (e.type === "blue") {
            e.x = e.baseX + Math.sin(e.age * 4 + e.lane) * 48;
            e.y += e.speed * dt;
          } else if (e.type === "heavy" || e.type === "turret") {
            e.x += Math.sin(e.age * 1.5 + e.lane) * 24 * dt;
            e.y += e.speed * dt;
          } else if (e.type === "boss") {
            e.y += (82 - e.y) * dt * 0.7;
            e.x = W / 2 + Math.sin(e.age * 0.9) * 92;
          }

          e.fire -= dt;
          if (e.fire <= 0 && e.y > 15 && e.y < H - 120) {
            enemyFire(e);
            e.fire = enemyTypes[e.type].fire * (0.75 + Math.random() * 0.55);
          }

          if (e.y > H + 80) enemies.splice(i, 1);
        }
      }

      function enemyFire(e) {
        const dx = player.x - e.x;
        const dy = player.y - e.y;
        const len = Math.max(1, Math.hypot(dx, dy));
        const speed = e.type === "boss" ? 170 : 135 + state.wave * 4;

        if (e.type === "boss") {
          for (let i = -3; i <= 3; i++) {
            const a = Math.atan2(dy, dx) + i * 0.18;
            enemyShots.push({ x: e.x, y: e.y + 28, vx: Math.cos(a) * speed, vy: Math.sin(a) * speed, r: 5 });
          }
        } else if (e.type === "turret" || e.type === "heavy") {
          for (let i = -1; i <= 1; i++) {
            const a = Math.atan2(dy, dx) + i * 0.16;
            enemyShots.push({ x: e.x, y: e.y + 14, vx: Math.cos(a) * speed, vy: Math.sin(a) * speed, r: 4 });
          }
        } else {
          enemyShots.push({ x: e.x, y: e.y + 12, vx: dx / len * speed, vy: dy / len * speed, r: 4 });
        }
        beep(180, 0.04, "sawtooth", 0.012);
      }

      function updateShots(dt) {
        for (let i = playerShots.length - 1; i >= 0; i--) {
          const b = playerShots[i];
          b.age += dt;
          if (b.kind === "rocket") {
            const target = nearestEnemy(b.x, b.y);
            if (target) {
              const dx = target.x - b.x;
              const dy = target.y - b.y;
              const len = Math.max(1, Math.hypot(dx, dy));
              b.vx += (dx / len) * 360 * dt;
              b.vy += (dy / len) * 360 * dt;
              const speed = Math.hypot(b.vx, b.vy);
              if (speed > 520) {
                b.vx = b.vx / speed * 520;
                b.vy = b.vy / speed * 520;
              }
            }
          } else if (b.kind === "sonic") {
            b.r += 34 * dt;
          }
          b.x += b.vx * dt;
          b.y += b.vy * dt;
          if (b.y < -48 || b.x < -48 || b.x > W + 48 || b.age > 2.6) playerShots.splice(i, 1);
        }
        for (let i = enemyShots.length - 1; i >= 0; i--) {
          const b = enemyShots[i];
          b.x += b.vx * dt;
          b.y += b.vy * dt;
          if (b.y > H + 30 || b.x < -30 || b.x > W + 30 || b.y < -40) enemyShots.splice(i, 1);
        }
      }

      function nearestEnemy(x, y) {
        let best = null;
        let bestD = Infinity;
        for (const e of enemies) {
          const d = Math.abs(e.x - x) + Math.abs(e.y - y);
          if (d < bestD) {
            bestD = d;
            best = e;
          }
        }
        return best;
      }

      function updatePowerups(dt) {
        for (let i = powerups.length - 1; i >= 0; i--) {
          const p = powerups[i];
          p.y += 74 * dt;
          p.x += Math.sin(p.y * 0.03) * 24 * dt;
          if (p.y > H + 20) powerups.splice(i, 1);
        }
      }

      function updateParticles(dt) {
        for (let i = particles.length - 1; i >= 0; i--) {
          const p = particles[i];
          p.x += p.vx * dt;
          p.y += p.vy * dt;
          p.life -= dt;
          if (p.life <= 0) particles.splice(i, 1);
        }
      }

      function collide() {
        for (let bi = playerShots.length - 1; bi >= 0; bi--) {
          const b = playerShots[bi];
          for (let ei = enemies.length - 1; ei >= 0; ei--) {
            const e = enemies[ei];
            if (dist(b.x, b.y, e.x, e.y) > b.r + e.r) continue;
            e.hp -= b.damage;
            hitSpark(b.x, b.y, b.kind === "rocket" ? "#ffcf52" : "#bfffff", b.kind === "sonic" ? 7 : 4);
            if (b.kind === "rocket") {
              explosion(b.x, b.y, 12);
              damageInCircle(b.x, b.y, 44 + currentLevel() * 6, b.damage * 0.72, false);
            }
            b.pierce--;
            if (b.pierce <= 0 || b.kind === "rocket") playerShots.splice(bi, 1);
            if (enemies[ei] === e && e.hp <= 0) killEnemy(ei);
            break;
          }
        }

        if (state.invuln <= 0) {
          for (let i = enemyShots.length - 1; i >= 0; i--) {
            const b = enemyShots[i];
            if (dist(b.x, b.y, player.x, player.y) <= b.r + player.r) {
              enemyShots.splice(i, 1);
              hurtPlayer();
              break;
            }
          }
          for (let i = enemies.length - 1; i >= 0; i--) {
            const e = enemies[i];
            if (dist(e.x, e.y, player.x, player.y) <= e.r + player.r) {
              enemies.splice(i, 1);
              hurtPlayer();
              break;
            }
          }
        }

        for (let i = powerups.length - 1; i >= 0; i--) {
          const p = powerups[i];
          if (dist(p.x, p.y, player.x, player.y) <= 22) {
            collectPowerup(p);
            powerups.splice(i, 1);
            sound("power");
          }
        }
      }

      function collectPowerup(p) {
        if (p.type === "B") {
          state.bombs = Math.min(5, state.bombs + 1);
          showMessage("BOMBA +1", 850);
          return;
        }

        const weaponMap = { P: state.weapon, L: "laser", R: "rocket", S: "sonic", N: "neon" };
        const weapon = weaponMap[p.type] || state.weapon;
        state.weapon = weapon;
        state.weaponLevels[weapon] = Math.min(5, state.weaponLevels[weapon] + 1);
        showMessage(weaponNames[weapon] + " SEVİYE " + state.weaponLevels[weapon], 950);
      }

      function killEnemy(index) {
        const e = enemies[index];
        state.score += e.score * currentLevel();
        state.high = Math.max(state.high, state.score);
        state.kills++;
        explosion(e.x, e.y, e.type === "boss" ? 42 : 15);
        if (Math.random() < (e.type === "boss" ? 1 : 0.22)) {
          const drops = ["P", "P", "B", "L", "R", "S", "N"];
          powerups.push({ x: e.x, y: e.y, type: drops[Math.floor(Math.random() * drops.length)] });
        }
        enemies.splice(index, 1);
        state.shake = Math.max(state.shake, e.type === "boss" ? 14 : 6);
        beep(e.type === "boss" ? 80 : 120, e.type === "boss" ? 0.3 : 0.12, "sawtooth", 0.035);

        if (state.score >= carriedScore + 5000 && !state.nextDimension) {
          state.nextDimension = true;
          sessionStorage.setItem("universe2ArcadeScore", String(state.score));
          showMessage("BOYUTSAL BASINÇ ARTIYOR", 2400);
        }
        if (e.type === "boss") nextWave();
      }

      function hurtPlayer() {
        state.lives--;
        state.weaponLevels[state.weapon] = Math.max(1, state.weaponLevels[state.weapon] - 1);
        state.invuln = 2.2;
        state.shake = 16;
        enemyShots.length = 0;
        explosion(player.x, player.y, 28);
        sound("hit");
        if (state.lives <= 0) gameOver();
      }

      function useBomb() {
        if (state.bombs <= 0) return;
        state.bombs--;
        state.bombFlash = 1;
        state.shake = Math.max(state.shake, 32);
        enemyShots.length = 0;
        for (let i = enemies.length - 1; i >= 0; i--) {
          enemies[i].hp -= enemies[i].type === "boss" ? 34 : 999;
          explosion(enemies[i].x, enemies[i].y, 10);
          if (enemies[i].hp <= 0) killEnemy(i);
        }
        for (let i = 0; i < 34; i++) {
          const a = Math.random() * Math.PI * 2;
          particles.push({
            x: player.x,
            y: player.y,
            vx: Math.cos(a) * (160 + Math.random() * 280),
            vy: Math.sin(a) * (160 + Math.random() * 280),
            life: 0.45 + Math.random() * 0.35,
            max: 0.8,
            s: 3 + Math.random() * 5,
            color: Math.random() < 0.5 ? "#eaffff" : "#ff55ff"
          });
        }
        sound("bomb");
      }

      function nextWave() {
        state.wave++;
        state.kills = 0;
        state.targetKills = 12 + state.wave * 4;
        bossSpawned = false;
        spawnClock = 1.2;
        showMessage("DALGA " + state.wave, 1400);
      }

      function gameOver() {
        state.mode = "over";
        localStorage.setItem("universe2ArcadeHigh", String(state.high));
        ui.finalScore.textContent = "Skor: " + state.score;
        ui.finalWave.textContent = "Dalga: " + state.wave;
        ui.finalHigh.textContent = "En iyi skor: " + state.high;
        sessionStorage.setItem("universe2ArcadeScore", String(state.score));
        ui.nextUniverse.style.display = state.nextDimension ? "inline-block" : "none";
        ui.gameOver.classList.remove("hide");
      }

      function restart() {
        state.mode = "play";
        state.score = 0;
        state.wave = 1;
        state.lives = 3;
        state.bombs = 2;
        state.weapon = "neon";
        state.weaponLevels = { neon: 1, laser: 1, rocket: 1, sonic: 1 };
        state.kills = 0;
        state.targetKills = 14;
        state.invuln = 1.8;
        state.nextDimension = false;
        bossSpawned = false;
        spawnClock = 0.8;
        hazardClock = 2.2;
        enemies.length = 0;
        enemyShots.length = 0;
        playerShots.length = 0;
        particles.length = 0;
        powerups.length = 0;
        hazards.length = 0;
        player.x = W / 2;
        player.y = H - 82;
        ui.gameOver.classList.add("hide");
        showMessage("YENİDEN KALKIŞ", 1200);
      }

      function draw() {
        const ox = state.shake > 0 ? (Math.random() - 0.5) * state.shake : 0;
        const oy = state.shake > 0 ? (Math.random() - 0.5) * state.shake : 0;
        ctx.save();
        ctx.translate(ox, oy);
        drawBackground();
        drawHazards();
        drawPowerups();
        drawPlayerShots();
        drawEnemies();
        drawEnemyShots();
        drawPlayer();
        drawParticles();
        if (state.bombFlash > 0) {
          ctx.fillStyle = "rgba(255,255,255," + (state.bombFlash * 0.28) + ")";
          ctx.fillRect(-10, -10, W + 20, H + 20);
          ctx.strokeStyle = "rgba(255,255,255," + state.bombFlash + ")";
          ctx.lineWidth = 4;
          ctx.beginPath();
          ctx.arc(player.x, player.y, (1 - state.bombFlash) * 520, 0, Math.PI * 2);
          ctx.stroke();
        }
        if (state.lightningFlash > 0) {
          ctx.fillStyle = "rgba(210,240,255," + state.lightningFlash * 0.16 + ")";
          ctx.fillRect(-10, -10, W + 20, H + 20);
        }
        ctx.restore();
      }

      function drawBackground() {
        ctx.fillStyle = "#030315";
        ctx.fillRect(0, 0, W, H);

        for (const s of stars) {
          ctx.fillStyle = s.s > 1.3 ? "#e9ffff" : "#55ffff";
          ctx.globalAlpha = s.s > 1.3 ? 0.65 : 0.35;
          ctx.fillRect(s.x, s.y, s.s, s.s);
        }
        ctx.globalAlpha = 1;

        const gridY = state.scroll % 48;
        ctx.strokeStyle = "rgba(0,255,255,0.12)";
        ctx.lineWidth = 1;
        for (let y = gridY - 48; y < H; y += 48) {
          ctx.beginPath();
          ctx.moveTo(48, y);
          ctx.lineTo(W - 48, y);
          ctx.stroke();
        }
        ctx.strokeStyle = "rgba(255,85,255,0.08)";
        for (let x = 72; x < W; x += 84) {
          ctx.beginPath();
          ctx.moveTo(x, 0);
          ctx.lineTo(x + Math.sin(state.scroll * 0.006 + x) * 18, H);
          ctx.stroke();
        }

        const ridgeY = H - 86 + Math.sin(state.scroll * 0.01) * 8;
        ctx.fillStyle = "#120b19";
        ctx.beginPath();
        ctx.moveTo(0, H);
        for (let x = 0; x <= W; x += 32) {
          const y = ridgeY + Math.sin(x * 0.035 + state.scroll * 0.018) * 18 + Math.sin(x * 0.013) * 26;
          ctx.lineTo(x, y);
        }
        ctx.lineTo(W, H);
        ctx.closePath();
        ctx.fill();

        ctx.fillStyle = "rgba(255,85,60,0.16)";
        for (let x = 36; x < W; x += 128) {
          const lavaY = ridgeY + Math.sin(x * 0.03 + state.scroll * 0.02) * 12;
          ctx.fillRect(x, lavaY + 12, 18, H - lavaY);
        }

        for (const c of clouds) {
          ctx.globalAlpha = c.a;
          ctx.fillStyle = "#9eefff";
          pixelOval(c.x, c.y, c.w, c.w * 0.34);
        }
        ctx.globalAlpha = 1;
      }

      function drawHazards() {
        for (const h of hazards) {
          if (h.type === "volcano") {
            ctx.fillStyle = "#251020";
            ctx.beginPath();
            ctx.moveTo(h.x - 46, h.y + 42);
            ctx.lineTo(h.x - 15, h.y - 24);
            ctx.lineTo(h.x + 16, h.y - 24);
            ctx.lineTo(h.x + 50, h.y + 42);
            ctx.closePath();
            ctx.fill();
            ctx.fillStyle = "#ff4e32";
            ctx.fillRect(h.x - 12, h.y - 28, 24, 10);
            ctx.fillStyle = "rgba(255,207,82,0.8)";
            ctx.fillRect(h.x - 6, h.y - 35 - Math.sin(h.age * 18) * 8, 12, 16);
          } else if (h.type === "lava") {
            ctx.fillStyle = "#ffcf52";
            ctx.fillRect(h.x - 7, h.y - 7, 14, 14);
            ctx.fillStyle = "#ff4e32";
            ctx.fillRect(h.x - 11, h.y - 2, 22, 8);
          } else if (h.type === "storm") {
            ctx.globalAlpha = 0.45;
            ctx.fillStyle = "#a9dfff";
            pixelOval(h.x, h.y, h.w, h.w * 0.34);
            ctx.globalAlpha = 1;
            if (h.strikeTime > 0) {
              ctx.strokeStyle = "#eaffff";
              ctx.lineWidth = 4;
              ctx.beginPath();
              ctx.moveTo(h.strikeX, h.y + 22);
              ctx.lineTo(h.strikeX - 22, h.y + 82);
              ctx.lineTo(h.strikeX + 15, h.y + 126);
              ctx.lineTo(h.strikeX - 8, h.y + 180);
              ctx.stroke();
              ctx.strokeStyle = "#55ffff";
              ctx.lineWidth = 2;
              ctx.stroke();
            }
          } else if (h.type === "tornado") {
            ctx.strokeStyle = "rgba(190,255,255,0.72)";
            ctx.lineWidth = 4;
            for (let i = 0; i < 5; i++) {
              ctx.beginPath();
              ctx.ellipse(h.x, h.y + i * 15, 36 - i * 5, 9, Math.sin(h.age * 4 + i), 0, Math.PI * 2);
              ctx.stroke();
            }
          } else if (h.type === "meteor") {
            ctx.strokeStyle = "rgba(255,207,82,0.8)";
            ctx.lineWidth = 5;
            ctx.beginPath();
            ctx.moveTo(h.x, h.y);
            ctx.lineTo(h.x - h.vx * 0.16, h.y - h.vy * 0.16);
            ctx.stroke();
            ctx.fillStyle = "#ff744a";
            ctx.fillRect(h.x - h.r * 0.5, h.y - h.r * 0.5, h.r, h.r);
            ctx.fillStyle = "#ffe6a3";
            ctx.fillRect(h.x - 4, h.y - 4, 8, 8);
          }
        }
      }

      function rect(x, y, w, h, color) {
        ctx.fillStyle = color;
        ctx.fillRect(x, y, w, h);
      }

      function poly(points, color) {
        ctx.fillStyle = color;
        ctx.beginPath();
        ctx.moveTo(points[0][0], points[0][1]);
        for (let i = 1; i < points.length; i++) ctx.lineTo(points[i][0], points[i][1]);
        ctx.closePath();
        ctx.fill();
      }

      function drawPlayer() {
        if (state.invuln > 0 && Math.floor(performance.now() / 80) % 2) return;
        const x = player.x;
        const y = player.y;
        ctx.save();
        ctx.translate(x, y);

        // Shadow outline
        poly([[0,-42],[-9,-30],[-12,12],[-29,0],[-52,11],[-32,19],[-22,17],[-17,34],[-7,31],[0,43],[7,31],[17,34],[22,17],[32,19],[52,11],[29,0],[12,12],[9,-30]], "#030611");

        // Main fuselage and nose
        poly([[0,-40],[-7,-28],[-8,15],[-5,30],[0,39],[5,30],[8,15],[7,-28]], "#59ffff");
        poly([[0,-39],[-4,-27],[0,-33],[4,-27]], "#eaffff");
        rect(-5, -22, 10, 25, "#236cff");
        rect(-3, -17, 6, 14, "#071d5a");
        rect(-2, -30, 4, 7, "#ffffff");

        // Wings
        poly([[-8,-6],[-30,-10],[-53,8],[-32,15],[-13,8]], "#286bff");
        poly([[8,-6],[30,-10],[53,8],[32,15],[13,8]], "#286bff");
        poly([[-28,-7],[-42,7],[-27,6],[-14,1]], "#8fd7ff");
        poly([[28,-7],[42,7],[27,6],[14,1]], "#8fd7ff");
        rect(-45, 8, 15, 5, "#0f2f89");
        rect(30, 8, 15, 5, "#0f2f89");

        // Tail and engines
        poly([[-8,18],[-20,33],[-8,30]], "#ff55ff");
        poly([[8,18],[20,33],[8,30]], "#ff55ff");
        rect(-14, 22, 7, 14, "#7c248b");
        rect(7, 22, 7, 14, "#7c248b");
        rect(-10, 34, 6, 12, "#ffcf52");
        rect(4, 34, 6, 12, "#ffcf52");
        rect(-8, 42, 4, 8, "#ff744a");
        rect(4, 42, 4, 8, "#ff744a");

        // Panel lines
        rect(-1, -5, 2, 28, "#bfffff");
        rect(-19, 5, 8, 2, "#bfffff");
        rect(11, 5, 8, 2, "#bfffff");
        ctx.restore();
      }

      function drawEnemies() {
        for (const e of enemies) {
          ctx.save();
          ctx.translate(e.x, e.y);
          if (e.type === "boss") drawBoss(e);
          else if (e.type === "blue") drawBlueEnemy(e);
          else if (e.type === "heavy" || e.type === "turret") drawHeavyEnemy(e);
          else drawRedEnemy(e);
          ctx.restore();
        }
      }

      function drawRedEnemy() {
        poly([[0,-24],[-12,-15],[-15,16],[0,24],[15,16],[12,-15]], "#050711");
        poly([[-10,-4],[-34,2],[-24,11],[-9,8]], "#050711");
        poly([[10,-4],[34,2],[24,11],[9,8]], "#050711");
        poly([[0,-22],[-9,-13],[-10,12],[0,20],[10,12],[9,-13]], "#ff315a");
        poly([[-9,-4],[-31,3],[-22,8],[-8,5]], "#8d0d31");
        poly([[9,-4],[31,3],[22,8],[8,5]], "#8d0d31");
        rect(-5, -18, 10, 6, "#ffd6df");
        rect(-4, -9, 8, 13, "#6b001f");
        rect(-2, -6, 4, 7, "#ffb6c8");
        rect(-16, 10, 8, 8, "#ff744a");
        rect(8, 10, 8, 8, "#ff744a");
        rect(-13, 18, 6, 5, "#5a0018");
        rect(7, 18, 6, 5, "#5a0018");
      }

      function drawBlueEnemy() {
        poly([[0,-28],[-14,-18],[-12,19],[0,29],[12,19],[14,-18]], "#030611");
        poly([[-8,-4],[-38,-12],[-31,7],[-8,10]], "#030611");
        poly([[8,-4],[38,-12],[31,7],[8,10]], "#030611");
        poly([[0,-25],[-10,-16],[-9,16],[0,25],[9,16],[10,-16]], "#4ba3ff");
        poly([[-8,-5],[-34,-10],[-27,4],[-8,7]], "#153a9c");
        poly([[8,-5],[34,-10],[27,4],[8,7]], "#153a9c");
        rect(-5, -24, 10, 8, "#d8ffff");
        rect(-5, -10, 10, 18, "#0b2a79");
        rect(-3, -7, 6, 12, "#9fd7ff");
        rect(-18, 13, 9, 9, "#ff55ff");
        rect(9, 13, 9, 9, "#ff55ff");
        rect(-29, -6, 8, 3, "#85cfff");
        rect(21, -6, 8, 3, "#85cfff");
      }

      function drawHeavyEnemy(e) {
        const main = e.type === "turret" ? "#9cff72" : "#ffb347";
        const dark = e.type === "turret" ? "#1f7142" : "#7a320d";
        poly([[-24,-25],[24,-25],[31,-8],[31,21],[16,33],[-16,33],[-31,21],[-31,-8]], "#030611");
        poly([[-34,-8],[-55,1],[-36,13],[-24,10]], "#030611");
        poly([[34,-8],[55,1],[36,13],[24,10]], "#030611");
        rect(-22, -21, 44, 42, main);
        rect(-15, -14, 30, 22, dark);
        rect(-8, -9, 16, 12, e.type === "turret" ? "#eaffff" : "#fff3b0");
        rect(-33, -3, 66, 12, "#111424");
        rect(-49, 3, 18, 9, main);
        rect(31, 3, 18, 9, main);
        rect(-23, 20, 12, 13, "#241018");
        rect(11, 20, 12, 13, "#241018");
        rect(-5, 29, 10, 10, e.type === "turret" ? "#55ffff" : "#ff744a");
        if (e.type === "turret") {
          rect(-4, -34, 8, 17, "#d8ffff");
          rect(-9, -38, 18, 6, "#55ffff");
        } else {
          rect(-14, -28, 8, 8, "#ffe0a2");
          rect(6, -28, 8, 8, "#ffe0a2");
        }
      }

      function drawBoss(e) {
        poly([[-72,-38],[72,-38],[96,-12],[118,4],[88,28],[43,33],[22,52],[-22,52],[-43,33],[-88,28],[-118,4],[-96,-12]], "#030611");
        poly([[-54,-54],[54,-54],[76,-31],[60,-9],[-60,-9],[-76,-31]], "#030611");
        poly([[-70,-34],[70,-34],[88,-12],[82,23],[34,31],[18,45],[-18,45],[-34,31],[-82,23],[-88,-12]], "#2b164d");
        poly([[-48,-49],[48,-49],[66,-30],[54,-14],[-54,-14],[-66,-30]], "#ff55ff");
        rect(-92, -8, 38, 19, "#8b2ab5");
        rect(54, -8, 38, 19, "#8b2ab5");
        rect(-113, 1, 24, 11, "#ff55ff");
        rect(89, 1, 24, 11, "#ff55ff");
        rect(-37, -27, 74, 36, "#1a0f38");
        rect(-20, -18, 40, 22, "#3b1b71");
        rect(-8, -12, 16, 16, "#eaffff");
        rect(-4, -8, 8, 8, "#55ffff");
        rect(-63, 15, 21, 8, "#55ffff");
        rect(42, 15, 21, 8, "#55ffff");
        rect(-28, 27, 12, 13, "#ff744a");
        rect(16, 27, 12, 13, "#ff744a");
        rect(-7, 42, 14, 13, "#ffcf52");
        ctx.fillStyle = "#55ffff";
        const w = 88 * Math.max(0, e.hp / (enemyTypes.boss.hp + state.wave * 8));
        ctx.fillRect(-44, 34, w, 5);
        rect(-44 + w, 34, 88 - w, 5, "#2a1032");
      }

      function drawPlayerShots() {
        for (const b of playerShots) {
          if (b.kind === "laser") {
            ctx.fillStyle = "#eaffff";
            ctx.fillRect(b.x - 2, b.y - 20, 4, 28);
            ctx.fillStyle = "#55ffff";
            ctx.fillRect(b.x - 5, b.y - 12, 10, 10);
          } else if (b.kind === "rocket") {
            ctx.fillStyle = "#d9d9d9";
            ctx.fillRect(b.x - 4, b.y - 10, 8, 18);
            ctx.fillStyle = "#ff4e32";
            ctx.fillRect(b.x - 7, b.y + 6, 14, 8);
            ctx.fillStyle = "#ffcf52";
            ctx.fillRect(b.x - 3, b.y + 13, 6, 10);
          } else if (b.kind === "sonic") {
            ctx.strokeStyle = "rgba(185,255,255,0.78)";
            ctx.lineWidth = 3;
            ctx.beginPath();
            ctx.arc(b.x, b.y, b.r, Math.PI * 1.08, Math.PI * 1.92);
            ctx.stroke();
            ctx.strokeStyle = "rgba(255,85,255,0.55)";
            ctx.lineWidth = 2;
            ctx.beginPath();
            ctx.arc(b.x, b.y + 6, b.r * 0.68, Math.PI * 1.08, Math.PI * 1.92);
            ctx.stroke();
          } else {
            ctx.fillStyle = "#eaffff";
            ctx.fillRect(b.x - 2, b.y - 10, 4, 14);
            ctx.fillStyle = "#55ffff";
            ctx.fillRect(b.x - 4, b.y - 2, 8, 4);
          }
        }
      }

      function drawEnemyShots() {
        for (const b of enemyShots) {
          ctx.fillStyle = "#ff4e72";
          ctx.fillRect(b.x - 4, b.y - 4, 8, 8);
          ctx.fillStyle = "#ffd6df";
          ctx.fillRect(b.x - 2, b.y - 2, 4, 4);
        }
      }

      function drawPowerups() {
        for (const p of powerups) {
          const colors = { P: "#55ffff", B: "#ff55ff", L: "#eaffff", R: "#ff744a", S: "#9cff72", N: "#61a8ff" };
          const c = colors[p.type] || "#55ffff";
          ctx.save();
          ctx.translate(p.x, p.y);
          rect(-15, -13, 30, 26, "#030611");
          rect(-12, -10, 24, 20, c);
          rect(-8, -6, 16, 12, "#eaffff");
          rect(-11, 8, 22, 3, "#152040");
          ctx.fillStyle = "#030315";
          ctx.font = "bold 16px Courier New";
          ctx.textAlign = "center";
          ctx.textBaseline = "middle";
          ctx.fillText(p.type, 0, 1);
          ctx.restore();
        }
      }

      function drawParticles() {
        for (const p of particles) {
          ctx.globalAlpha = Math.max(0, p.life / p.max);
          ctx.fillStyle = p.color;
          ctx.fillRect(p.x, p.y, p.s, p.s);
        }
        ctx.globalAlpha = 1;
      }

      function explosion(x, y, count) {
        for (let i = 0; i < count; i++) {
          const a = Math.random() * Math.PI * 2;
          const v = 45 + Math.random() * 170;
          particles.push({
            x,
            y,
            vx: Math.cos(a) * v,
            vy: Math.sin(a) * v,
            life: 0.35 + Math.random() * 0.45,
            max: 0.8,
            s: 2 + Math.random() * 4,
            color: Math.random() < 0.5 ? "#ffcf52" : "#ff4e72"
          });
        }
      }

      function hitSpark(x, y, color, count) {
        for (let i = 0; i < count; i++) {
          particles.push({
            x,
            y,
            vx: (Math.random() - 0.5) * 120,
            vy: (Math.random() - 0.5) * 120,
            life: 0.12 + Math.random() * 0.16,
            max: 0.25,
            s: 2,
            color
          });
        }
      }

      function pixelOval(x, y, w, h) {
        ctx.fillRect(x - w * 0.35, y - h * 0.2, w * 0.7, h * 0.4);
        ctx.fillRect(x - w * 0.5, y, w, h * 0.34);
      }

      function showMessage(text, duration) {
        ui.message.textContent = text;
        ui.message.classList.add("show");
        messageClock = duration / 1000;
      }

      function updateHud() {
        ui.score.textContent = state.score;
        ui.wave.textContent = state.wave;
        ui.weapon.textContent = weaponNames[state.weapon];
        ui.power.textContent = currentLevel();
        ui.bombs.textContent = state.bombs;
        ui.lives.textContent = Math.max(0, state.lives);
      }

      function clamp(v, min, max) { return Math.max(min, Math.min(max, v)); }
      function dist(ax, ay, bx, by) { return Math.hypot(ax - bx, ay - by); }

      init();
    })();
  </script>
</body>
</html>
