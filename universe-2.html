<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Universe-2: The Awakening | Convivium</title>
    <meta name="description" content="Boyutlar arası yolculuk devam ediyor... Hoş geldin, yeni evrene.">
    <meta name="author" content="Ersin Binal">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #000;
            overflow: hidden;
            font-family: 'Courier New', monospace;
            color: #fff;
        }

        #container {
            width: 100vw;
            height: 100vh;
            position: relative;
        }

        /* Giriş Animasyonu Katmanı */
        #introOverlay {
            position: fixed;
            top: 0; left: 0;
            width: 100vw;
            height: 100vh;
            background: #000;
            z-index: 1000;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            transition: opacity 2s;
        }

        #introOverlay.hide {
            opacity: 0;
            pointer-events: none;
        }

        #introOverlay.rift-entry {
            overflow: hidden;
            background:
                radial-gradient(circle at center, rgba(255, 85, 255, 0.35) 0 8%, rgba(85, 255, 255, 0.18) 20%, transparent 42%),
                radial-gradient(circle at center, rgba(0, 0, 0, 0) 0 38%, rgba(0, 0, 0, 0.92) 72%),
                #020008;
        }

        .rift-stage {
            position: absolute;
            inset: 0;
            display: grid;
            place-items: center;
            overflow: hidden;
        }

        .pixel-river {
            position: absolute;
            width: min(74vmin, 620px);
            height: min(74vmin, 620px);
            transform: perspective(720px) rotateX(58deg) translateY(16vmin);
            background:
                linear-gradient(90deg, transparent 0 42%, rgba(0, 255, 255, 0.9) 42% 45%, transparent 45% 55%, rgba(255, 85, 255, 0.8) 55% 58%, transparent 58%),
                linear-gradient(rgba(85, 255, 255, 0.22) 2px, transparent 2px),
                linear-gradient(90deg, rgba(255, 85, 255, 0.18) 2px, transparent 2px),
                #03152a;
            background-size: 100% 100%, 24px 24px, 24px 24px, 100% 100%;
            clip-path: polygon(36% 0, 64% 0, 100% 100%, 0 100%);
            image-rendering: pixelated;
            box-shadow: 0 0 44px rgba(85, 255, 255, 0.45);
            animation: pixelRiverShift 9.8s ease-in-out forwards;
        }

        .pixel-ship {
            position: absolute;
            width: 96px;
            height: 128px;
            top: 58%;
            left: 50%;
            transform: translate(-50%, -50%);
            image-rendering: pixelated;
            filter: drop-shadow(0 0 16px rgba(85, 255, 255, 0.9));
            animation: pixelShipAscend 9.8s cubic-bezier(.2,.8,.2,1) forwards;
        }

        .pixel-ship::before {
            content: "";
            position: absolute;
            width: 16px;
            height: 16px;
            left: 40px;
            top: 0;
            background: #cfffff;
            box-shadow:
                0 16px #22d7ff,
                -16px 32px #22d7ff, 0 32px #22d7ff, 16px 32px #22d7ff,
                -32px 48px #1177ff, -16px 48px #22d7ff, 0 48px #ffffff, 16px 48px #22d7ff, 32px 48px #1177ff,
                -32px 64px #1177ff, 0 64px #ffbb33, 32px 64px #1177ff,
                -16px 80px #ff55ff, 16px 80px #ff55ff;
        }

        .gl-lattice {
            position: absolute;
            width: min(86vmin, 760px);
            aspect-ratio: 1;
            border-radius: 50%;
            opacity: 0;
            background:
                radial-gradient(circle, transparent 0 28%, rgba(85, 255, 255, 0.2) 29% 30%, transparent 31% 100%),
                conic-gradient(from 0deg, rgba(85,255,255,0), rgba(85,255,255,.8), rgba(255,85,255,.75), rgba(85,255,255,0));
            mask: radial-gradient(circle, transparent 0 24%, #000 25% 68%, transparent 69%);
            animation: glLatticeReveal 9.8s ease-in-out forwards;
        }

        .gl-star-field {
            position: absolute;
            inset: 0;
            opacity: 0;
            background:
                radial-gradient(circle at 15% 22%, rgba(255,255,255,.9) 0 1px, transparent 2px),
                radial-gradient(circle at 78% 28%, rgba(85,255,255,.9) 0 1px, transparent 2px),
                radial-gradient(circle at 30% 68%, rgba(255,85,255,.9) 0 1px, transparent 2px),
                radial-gradient(circle at 62% 76%, rgba(255,255,255,.85) 0 1px, transparent 2px),
                radial-gradient(circle at 50% 50%, rgba(85, 255, 255, 0.28), transparent 42%);
            animation: starFieldReveal 9.8s ease-in-out forwards;
        }

        .rift-story {
            position: relative;
            z-index: 2;
            width: min(90vw, 920px);
            min-height: 320px;
            display: grid;
            place-items: center;
            text-align: center;
            pointer-events: none;
        }

        .rift-story-line {
            position: absolute;
            max-width: min(88vw, 820px);
            color: #eaffff;
            font-size: clamp(21px, 4vw, 42px);
            text-shadow:
                0 0 16px rgba(85, 255, 255, 0.95),
                0 0 32px rgba(255, 85, 255, 0.7);
            opacity: 0;
            animation: riftStoryLine 3.4s ease-in-out forwards;
        }

        .rift-story-line.small {
            font-size: clamp(15px, 2.4vw, 24px);
            color: #bffcff;
        }

        .rift-story-line.line-1 { animation-delay: 0.2s; }
        .rift-story-line.line-2 { animation-delay: 2s; }
        .rift-story-line.line-3 { animation-delay: 3.8s; }
        .rift-story-line.line-4 { animation-delay: 5.8s; }
        .rift-story-line.line-5 { animation-delay: 7.9s; }

        .rift-entry .rift-vortex {
            position: absolute;
            opacity: 0;
            animation: riftSpin 1.8s linear infinite, riftPulse 1.1s ease-in-out infinite alternate, vortexReturn 9.8s ease-in-out forwards;
        }

        .rift-vortex {
            position: relative;
            width: min(72vmin, 640px);
            aspect-ratio: 1;
            border-radius: 50%;
            border: 2px solid rgba(85, 255, 255, 0.75);
            box-shadow:
                0 0 35px rgba(85, 255, 255, 0.9),
                inset 0 0 70px rgba(255, 85, 255, 0.65);
            animation: riftSpin 1.8s linear infinite, riftPulse 1.1s ease-in-out infinite alternate;
        }

        .rift-vortex::before,
        .rift-vortex::after {
            content: "";
            position: absolute;
            inset: 18%;
            border-radius: 50%;
            border: 4px dashed rgba(255, 255, 255, 0.68);
            box-shadow: 0 0 24px rgba(255, 85, 255, 0.9);
        }

        .rift-vortex::after {
            inset: 34%;
            border-color: rgba(85, 255, 255, 0.8);
            animation: riftSpin 0.9s linear infinite reverse;
        }

        .rift-status {
            margin-top: 32px;
            color: #fff;
            font-size: clamp(16px, 3vw, 28px);
            text-shadow: 0 0 20px rgba(85, 255, 255, 0.9);
            letter-spacing: 0;
            opacity: 0.9;
        }

        @keyframes riftSpin {
            to { transform: rotate(360deg); }
        }

        @keyframes riftPulse {
            from {
                filter: hue-rotate(0deg);
                box-shadow:
                    0 0 28px rgba(85, 255, 255, 0.75),
                    inset 0 0 56px rgba(255, 85, 255, 0.5);
            }
            to {
                filter: hue-rotate(55deg);
                box-shadow:
                    0 0 52px rgba(85, 255, 255, 0.95),
                    inset 0 0 92px rgba(255, 85, 255, 0.72);
            }
        }

        @keyframes pixelRiverShift {
            0% { opacity: 1; filter: saturate(1); transform: perspective(720px) rotateX(58deg) translateY(16vmin) scale(1); }
            48% { opacity: 1; filter: saturate(1.6) contrast(1.25); }
            70% { opacity: 0.42; transform: perspective(720px) rotateX(40deg) translateY(2vmin) scale(0.82); }
            100% { opacity: 0; transform: perspective(720px) rotateX(8deg) translateY(-10vmin) scale(0.22); }
        }

        @keyframes pixelShipAscend {
            0% { opacity: 1; transform: translate(-50%, -50%) scale(1); }
            42% { opacity: 1; transform: translate(-50%, -66%) scale(0.9); filter: drop-shadow(0 0 18px rgba(85, 255, 255, 0.9)); }
            66% { opacity: 0.8; transform: translate(-50%, -86%) scale(0.55); filter: blur(1px) drop-shadow(0 0 30px rgba(255, 85, 255, 1)); }
            100% { opacity: 0; transform: translate(-50%, -104%) scale(0.08); filter: blur(5px); }
        }

        @keyframes glLatticeReveal {
            0%, 36% { opacity: 0; transform: scale(0.35) rotate(0deg); }
            64% { opacity: 0.82; transform: scale(1) rotate(160deg); }
            100% { opacity: 0.28; transform: scale(1.35) rotate(360deg); }
        }

        @keyframes starFieldReveal {
            0%, 48% { opacity: 0; transform: scale(1.15); }
            76% { opacity: 0.9; transform: scale(1); }
            100% { opacity: 0.55; transform: scale(0.96); }
        }

        @keyframes riftStoryLine {
            0% { opacity: 0; transform: translateY(22px) scale(0.98); }
            18%, 74% { opacity: 1; transform: translateY(0) scale(1); }
            100% { opacity: 0; transform: translateY(-20px) scale(1.02); }
        }

        @keyframes vortexReturn {
            0%, 58% { opacity: 0; transform: scale(0.2); }
            78% { opacity: 0.95; transform: scale(0.92); }
            100% { opacity: 0.35; transform: scale(1.35); }
        }

        .intro-text {
            font-size: 32px;
            color: #55FFFF;
            text-align: center;
            opacity: 0;
            text-shadow: 0 0 20px rgba(85, 255, 255, 0.8);
            margin: 20px 0;
            animation: fadeInOut 4s ease-in-out forwards;
        }

        .intro-text.delayed-1 { animation-delay: 2s; }
        .intro-text.delayed-2 { animation-delay: 4s; }
        .intro-text.delayed-3 { animation-delay: 6s; }

        @keyframes fadeInOut {
            0% { opacity: 0; transform: translateY(20px); }
            20% { opacity: 1; transform: translateY(0); }
            80% { opacity: 1; transform: translateY(0); }
            100% { opacity: 0; transform: translateY(-20px); }
        }

        /* HUD */
        #hud {
            position: fixed;
            top: 20px;
            left: 20px;
            z-index: 100;
            font-size: 18px;
            color: #55FFFF;
            text-shadow: 0 0 10px rgba(85, 255, 255, 0.5);
            user-select: none;
        }

        #hud div {
            margin: 5px 0;
        }

        /* Bilgi Mesajı */
        #infoBox {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0, 0, 0, 0.7);
            padding: 15px 30px;
            border: 2px solid #55FFFF;
            border-radius: 5px;
            color: #55FFFF;
            font-size: 16px;
            text-align: center;
            z-index: 100;
            opacity: 0;
            transition: opacity 0.5s;
        }

        #infoBox.show {
            opacity: 1;
        }

        /* Portal İkonu (Universe-3 için hazırlık) */
        #portalIndicator {
            position: fixed;
            top: 20px;
            right: 20px;
            width: 60px;
            height: 60px;
            border: 3px solid #FF55FF;
            border-radius: 50%;
            display: none;
            justify-content: center;
            align-items: center;
            font-size: 24px;
            color: #FF55FF;
            text-shadow: 0 0 15px rgba(255, 85, 255, 0.8);
            animation: pulse 2s infinite;
            z-index: 100;
        }

        #portalIndicator.active {
            display: flex;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.1); opacity: 0.7; }
        }

        /* Yükleniyor */
        #loading {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: #55FFFF;
            font-size: 24px;
            z-index: 2000;
        }
    </style>
</head>
<body>
    <div id="container"></div>

    <!-- Giriş Animasyonu -->
    <div id="introOverlay">
        <div class="intro-text">WHERE... AM I?</div>
        <div class="intro-text delayed-1">THE WORLD HAS CHANGED...</div>
        <div class="intro-text delayed-2">EVERYTHING IS DIFFERENT NOW.</div>
        <div class="intro-text delayed-3">THE CURRENT HAS SHIFTED</div>
    </div>

    <!-- HUD -->
    <div id="hud">
        <div>SCORE: <span id="scoreDisplay">0</span></div>
        <div>DIMENSION: <span id="dimensionDisplay" style="color: #FF55FF;">UNIVERSE-2</span></div>
        <div>TECH LEVEL: <span style="color: #FFFF55;">WEBGL 3D</span></div>
    </div>

    <!-- Bilgi Kutusu -->
    <div id="infoBox">
        Use ARROW KEYS to move • SPACE to charge and fire
    </div>

    <!-- Portal Göstergesi -->
    <div id="portalIndicator">
        <span>∞</span>
    </div>

    <div id="loading">LOADING SIGNAL...</div>

    <script src="https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.min.js"></script>
    <script>
        // ============================================
        // UNIVERSE-2: THE AWAKENING
        // 5. Boyutun Duvarlarını Yıkan Yolculuk
        // ============================================

        let scene, camera, renderer;
        let ship, chargeCore;
        let enemies = [];
        let shots = [];
        let enemyShots = [];
        let stars;
        const entryParams = new URLSearchParams(window.location.search);
        let shiftedEntry = null;
        try {
            shiftedEntry = JSON.parse(sessionStorage.getItem('neonRiverDimensionShift') || 'null');
        } catch(e) {}
        const enteredFromNeon = entryParams.get('rift') === 'neon' || !!shiftedEntry;
        const rawCarriedScore = Number(entryParams.get('score') || (shiftedEntry && shiftedEntry.score) || 0);
        const carriedScore = Number.isFinite(rawCarriedScore) ? Math.max(0, rawCarriedScore) : 0;
        const nextDimensionScore = enteredFromNeon && carriedScore > 0 ? carriedScore + 5000 : 5000;
        let score = carriedScore;
        let gameStarted = false;
        let nextDimensionReady = false;

        const keys = {};
        let speed = 1, targetSpeed = 1, lateralVelocity = 0;
        let charging = false, chargePower = 0;

        if (enteredFromNeon) {
            prepareRiftEntry();
        }

        const introHoldTime = enteredFromNeon ? 10600 : 10000;

        // Giriş animasyonunu kontrol et
        setTimeout(() => {
            document.getElementById('introOverlay').classList.add('hide');
            setTimeout(startGameFlow, enteredFromNeon ? 900 : 2000);
        }, introHoldTime);

        function prepareRiftEntry() {
            const introOverlay = document.getElementById('introOverlay');
            introOverlay.classList.add('rift-entry');
            introOverlay.innerHTML = `
                <div class="rift-stage">
                    <div class="gl-star-field"></div>
                    <div class="pixel-river"></div>
                    <div class="gl-lattice"></div>
                    <div class="rift-vortex"></div>
                    <div class="pixel-ship"></div>
                </div>
                <div class="rift-story">
                    <div class="rift-story-line line-1">WHERE... AM I?</div>
                    <div class="rift-story-line line-2">THE WORLD HAS CHANGED...</div>
                    <div class="rift-story-line small line-3">THE NEON RIVER IS NO LONGER WATER.</div>
                    <div class="rift-story-line line-4">PIXELS ARE BREAKING INTO OPENGL LIGHT.</div>
                    <div class="rift-story-line small line-5">THE CURRENT HAS SHIFTED.</div>
                </div>`;
            document.getElementById('loading').textContent = 'RIFT STABILIZING...';
            document.getElementById('dimensionDisplay').textContent = 'SHIFTED CURRENT';
        }

        function startGameFlow() {
            gameStarted = true;
            updateScore();
            document.getElementById('infoBox').innerHTML = enteredFromNeon
                ? 'Flow stabilized'
                : 'Use ARROW KEYS to move • SPACE to charge and fire';
            document.getElementById('infoBox').classList.add('show');
            setTimeout(() => {
                document.getElementById('infoBox').classList.remove('show');
            }, enteredFromNeon ? 2200 : 5000);
            if (enteredFromNeon) {
                try { sessionStorage.removeItem('neonRiverDimensionShift'); } catch(e) {}
            }
        }

        // ============================================
        // SCENE SETUP
        // ============================================
        function initScene() {
            scene = new THREE.Scene();
            scene.fog = new THREE.Fog(0x000020, 100, 800);

            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 2000);
            camera.position.set(0, 12, 35);
            camera.lookAt(0, 0, -100);

            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(window.devicePixelRatio);
            renderer.setClearColor(0x000020);
            document.getElementById('container').appendChild(renderer.domElement);

            document.getElementById('loading').style.display = 'none';
        }

        // ============================================
        // LIGHTING
        // ============================================
        function setupLights() {
            const ambient = new THREE.AmbientLight(0x4444ff, 0.8);
            scene.add(ambient);

            const directional = new THREE.DirectionalLight(0xaaccff, 1.5);
            directional.position.set(50, 80, 50);
            scene.add(directional);

            // Neon glow
            const pointLight = new THREE.PointLight(0x55ffff, 2, 100);
            pointLight.position.set(0, 10, -50);
            scene.add(pointLight);
        }

        // ============================================
        // STARFIELD
        // ============================================
        function createStarfield() {
            const starGeometry = new THREE.BufferGeometry();
            const starPositions = [];
            const starColors = [];

            for (let i = 0; i < 2000; i++) {
                starPositions.push(
                    (Math.random() - 0.5) * 1000,
                    (Math.random() - 0.5) * 600,
                    -Math.random() * 2000
                );

                // Renkli yıldızlar
                const color = new THREE.Color();
                if (Math.random() > 0.95) {
                    color.setHSL(Math.random(), 1, 0.7);
                } else {
                    color.setHSL(0, 0, 0.8 + Math.random() * 0.2);
                }
                starColors.push(color.r, color.g, color.b);
            }

            starGeometry.setAttribute('position', new THREE.Float32BufferAttribute(starPositions, 3));
            starGeometry.setAttribute('color', new THREE.Float32BufferAttribute(starColors, 3));

            const starMaterial = new THREE.PointsMaterial({
                size: 1.5,
                vertexColors: true,
                transparent: true,
                opacity: 0.9
            });

            stars = new THREE.Points(starGeometry, starMaterial);
            scene.add(stars);
        }

        // ============================================
        // PLAYER SHIP (Gelişmiş 3D Model)
        // ============================================
        function createPlayerShip() {
            ship = new THREE.Group();

            // Ana gövde - daha detaylı
            const bodyGeometry = new THREE.CylinderGeometry(1.5, 2, 8, 16);
            const bodyMaterial = new THREE.MeshStandardMaterial({
                color: 0xbfdcff,
                metalness: 0.9,
                roughness: 0.2,
                emissive: 0x1155ff,
                emissiveIntensity: 0.2
            });
            const body = new THREE.Mesh(bodyGeometry, bodyMaterial);
            body.rotation.x = Math.PI / 2;
            ship.add(body);

            // Burun - keskin
            const noseGeometry = new THREE.ConeGeometry(1.5, 4, 16);
            const noseMaterial = new THREE.MeshStandardMaterial({
                color: 0xe8f2ff,
                metalness: 0.95,
                roughness: 0.1
            });
            const nose = new THREE.Mesh(noseGeometry, noseMaterial);
            nose.rotation.x = Math.PI / 2;
            nose.position.z = -6;
            ship.add(nose);

            // Kanatlar
            const wingGeometry = new THREE.BoxGeometry(8, 0.3, 3);
            const wingMaterial = new THREE.MeshStandardMaterial({
                color: 0x55aaff,
                metalness: 0.8,
                roughness: 0.3
            });
            const wings = new THREE.Mesh(wingGeometry, wingMaterial);
            wings.position.y = -0.5;
            wings.position.z = 1;
            ship.add(wings);

            // Şarj çekirdeği (parlayan)
            const coreGeometry = new THREE.SphereGeometry(0.4, 16, 16);
            const coreMaterial = new THREE.MeshStandardMaterial({
                color: 0x55ffff,
                emissive: 0x33aaff,
                emissiveIntensity: 0,
                metalness: 0.5,
                roughness: 0.1
            });
            chargeCore = new THREE.Mesh(coreGeometry, coreMaterial);
            chargeCore.position.z = -8;
            ship.add(chargeCore);

            // Motor parıltısı
            const engineGlow = new THREE.PointLight(0x55ffff, 2, 20);
            engineGlow.position.z = 5;
            ship.add(engineGlow);

            ship.position.y = 2;
            scene.add(ship);
        }

        // ============================================
        // ENEMY SYSTEM
        // ============================================
        function createEnemy() {
            const enemyGroup = new THREE.Group();

            // Düşman gövdesi
            const hullGeometry = new THREE.BoxGeometry(3, 1.5, 4);
            const hullMaterial = new THREE.MeshStandardMaterial({
                color: 0xff3333,
                metalness: 0.7,
                roughness: 0.3,
                emissive: 0xff0000,
                emissiveIntensity: 0.3
            });
            const hull = new THREE.Mesh(hullGeometry, hullMaterial);
            enemyGroup.add(hull);

            // Kanatlar
            const wingGeometry = new THREE.BoxGeometry(6, 0.4, 1.5);
            const wing = new THREE.Mesh(wingGeometry, hullMaterial);
            wing.position.y = -0.5;
            enemyGroup.add(wing);

            // Silah
            const gunGeometry = new THREE.CylinderGeometry(0.2, 0.2, 2, 8);
            const gunMaterial = new THREE.MeshStandardMaterial({ color: 0xaa0000 });
            const gun = new THREE.Mesh(gunGeometry, gunMaterial);
            gun.rotation.x = Math.PI / 2;
            gun.position.z = 2;
            enemyGroup.add(gun);

            // Pozisyon
            const angle = Math.random() * Math.PI * 2;
            const radius = 100 + Math.random() * 150;
            enemyGroup.position.set(
                Math.cos(angle) * radius,
                (Math.random() - 0.5) * 30,
                -2000 - Math.random() * 500
            );

            enemyGroup.userData = {
                speed: 1.5 + Math.random() * 0.5,
                fireCooldown: Math.random() * 100,
                health: 100
            };

            scene.add(enemyGroup);
            enemies.push(enemyGroup);
        }

        // Düşman spawn
        setInterval(() => {
            if (gameStarted && enemies.length < 15) {
                createEnemy();
            }
        }, 1500);

        // ============================================
        // SHOOTING SYSTEM
        // ============================================
        function firePlasma(power) {
            const shotSize = Math.min(3, 0.8 + power / 25);
            const shotGeometry = new THREE.SphereGeometry(shotSize, 16, 16);
            const shotMaterial = new THREE.MeshStandardMaterial({
                color: 0x55ffff,
                emissive: 0x33aaff,
                emissiveIntensity: power / 20,
                metalness: 0.5,
                roughness: 0.1
            });
            const shot = new THREE.Mesh(shotGeometry, shotMaterial);

            const worldPos = new THREE.Vector3();
            chargeCore.getWorldPosition(worldPos);
            shot.position.copy(worldPos);

            shot.userData = {
                speed: 4 + power / 15,
                damage: 30 + power
            };

            // Glow efekti
            const glowLight = new THREE.PointLight(0x55ffff, power / 10, 30);
            shot.add(glowLight);

            scene.add(shot);
            shots.push(shot);

            playSound(800 + power * 2, 0.15, 'sine');
        }

        function fireEnemyShot(enemy) {
            const shotGeometry = new THREE.SphereGeometry(0.5, 8, 8);
            const shotMaterial = new THREE.MeshBasicMaterial({
                color: 0xff3333,
                emissive: 0xff0000,
                emissiveIntensity: 1
            });
            const shot = new THREE.Mesh(shotGeometry, shotMaterial);

            shot.position.copy(enemy.position);

            const direction = ship.position.clone()
                .sub(enemy.position)
                .normalize()
                .multiplyScalar(-5);

            shot.userData = { velocity: direction };

            scene.add(shot);
            enemyShots.push(shot);
        }

        // ============================================
        // INPUT
        // ============================================
        window.addEventListener('keydown', (e) => {
            keys[e.code] = true;
            if (e.code === 'Space' && !charging && gameStarted) {
                charging = true;
                chargePower = 0;
            }
        });

        window.addEventListener('keyup', (e) => {
            keys[e.code] = false;
            if (e.code === 'Space' && charging) {
                firePlasma(chargePower);
                charging = false;
                chargePower = 0;
                chargeCore.scale.set(1, 1, 1);
                chargeCore.material.emissiveIntensity = 0;
            }
        });

        // ============================================
        // SOUND
        // ============================================
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

        function playSound(freq, duration, type = 'square') {
            try {
                const osc = audioCtx.createOscillator();
                const gain = audioCtx.createGain();
                osc.type = type;
                osc.frequency.value = freq;
                gain.gain.value = 0.08;
                gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + duration);
                osc.connect(gain);
                gain.connect(audioCtx.destination);
                osc.start();
                osc.stop(audioCtx.currentTime + duration);
            } catch (e) {}
        }

        // ============================================
        // GAME LOOP
        // ============================================
        function animate() {
            requestAnimationFrame(animate);

            if (!gameStarted) {
                renderer.render(scene, camera);
                return;
            }

            // Oyuncu hareketi
            if (keys.ArrowLeft) lateralVelocity -= 0.04;
            if (keys.ArrowRight) lateralVelocity += 0.04;
            lateralVelocity *= 0.88;
            ship.position.x += lateralVelocity * 12;
            ship.position.x = THREE.MathUtils.clamp(ship.position.x, -25, 25);

            if (keys.ArrowUp) targetSpeed += 0.05;
            if (keys.ArrowDown) targetSpeed -= 0.05;
            targetSpeed = THREE.MathUtils.clamp(targetSpeed, 0.5, 3);
            speed += (targetSpeed - speed) * 0.1;

            // Şarj mekaniği
            if (charging) {
                chargePower = Math.min(150, chargePower + 2);
                const scale = 1 + chargePower / 100;
                chargeCore.scale.set(scale, scale, scale);
                chargeCore.material.emissiveIntensity = chargePower / 40;
            }

            // Yıldızlar
            const starPos = stars.geometry.attributes.position.array;
            for (let i = 2; i < starPos.length; i += 3) {
                starPos[i] += 2.5 * speed;
                if (starPos[i] > 100) starPos[i] = -2000;
            }
            stars.geometry.attributes.position.needsUpdate = true;

            // Oyuncu mermileri
            shots.forEach((shot, i) => {
                shot.position.z -= shot.userData.speed * speed;
                shot.rotation.y += 0.1;

                if (shot.position.z < -2000) {
                    scene.remove(shot);
                    shots.splice(i, 1);
                }
            });

            // Düşmanlar
            enemies.forEach((enemy, ei) => {
                enemy.position.z += enemy.userData.speed * speed;
                enemy.position.x += (ship.position.x - enemy.position.x) * 0.003;
                enemy.lookAt(ship.position);

                // Ateş et
                enemy.userData.fireCooldown--;
                if (enemy.userData.fireCooldown < 0) {
                    fireEnemyShot(enemy);
                    enemy.userData.fireCooldown = 80 + Math.random() * 60;
                }

                // Çarpışma kontrolü
                shots.forEach((shot, si) => {
                    if (shot.position.distanceTo(enemy.position) < 3) {
                        enemy.userData.health -= shot.userData.damage;
                        scene.remove(shot);
                        shots.splice(si, 1);

                        if (enemy.userData.health <= 0) {
                            createExplosion(enemy.position);
                            scene.remove(enemy);
                            enemies.splice(ei, 1);
                            score += 200;
                            updateScore();
                            playSound(150, 0.3, 'sawtooth');

                            // Bu evrende 5000 puan daha kazaninca sonraki kırılma hazır
                            if (score >= nextDimensionScore && !nextDimensionReady) {
                                nextDimensionReady = true;
                                document.getElementById('portalIndicator').classList.add('active');
                                document.getElementById('infoBox').innerHTML = 'DIMENSIONAL BREACH DETECTED<br>Next evolution awaits...';
                                document.getElementById('infoBox').classList.add('show');
                            }
                        }
                    }
                });

                // Ekranın dışına çıktı
                if (enemy.position.z > 100) {
                    scene.remove(enemy);
                    enemies.splice(ei, 1);
                }
            });

            // Düşman mermileri
            enemyShots.forEach((shot, i) => {
                shot.position.add(shot.userData.velocity);

                if (shot.position.distanceTo(ship.position) < 3) {
                    // Oyuncu vuruldu
                    scene.remove(shot);
                    enemyShots.splice(i, 1);
                    playSound(100, 0.4, 'sawtooth');
                }

                if (shot.position.z > 100) {
                    scene.remove(shot);
                    enemyShots.splice(i, 1);
                }
            });

            renderer.render(scene, camera);
        }

        function createExplosion(position) {
            // Basit patlama efekti
            for (let i = 0; i < 12; i++) {
                const particleGeometry = new THREE.SphereGeometry(0.3, 4, 4);
                const particleMaterial = new THREE.MeshBasicMaterial({
                    color: Math.random() > 0.5 ? 0xff5500 : 0xffaa00
                });
                const particle = new THREE.Mesh(particleGeometry, particleMaterial);
                particle.position.copy(position);

                const velocity = new THREE.Vector3(
                    (Math.random() - 0.5) * 5,
                    (Math.random() - 0.5) * 5,
                    (Math.random() - 0.5) * 5
                );
                particle.userData = { velocity: velocity, life: 30 };

                scene.add(particle);

                // Parçacık animasyonu
                const animateParticle = () => {
                    particle.position.add(particle.userData.velocity);
                    particle.userData.life--;
                    particle.material.opacity = particle.userData.life / 30;

                    if (particle.userData.life > 0) {
                        requestAnimationFrame(animateParticle);
                    } else {
                        scene.remove(particle);
                    }
                };
                animateParticle();
            }
        }

        function updateScore() {
            document.getElementById('scoreDisplay').textContent = score;
        }

        // ============================================
        // RESIZE
        // ============================================
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        // ============================================
        // INITIALIZE
        // ============================================
        initScene();
        setupLights();
        createStarfield();
        createPlayerShip();

        animate();
    </script>
</body>
</html>
